<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Malta Trip Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sidebar-width: 380px;
      --bg: #0f1923;
      --bg-card: #182633;
      --bg-card-hover: #1e3044;
      --text: #e8eaed;
      --text-muted: #8b9db5;
      --border: #263b50;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,.35);
      --fri: #e85d04;
      --sat: #0096c7;
      --sun: #2d6a4f;
      --mon: #7b2cbf;
      --walk: #e63946;
      --transport: #6c757d;
    }

    html {
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      inset: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      width: 100%;
      overflow: hidden;
      display: flex;
      overscroll-behavior: none;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100vh;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: transform .3s ease, min-width .3s ease, width .3s ease;
    }
    .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-width))); min-width: 0; width: 0; }

    .sidebar-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; line-height: 1.2; }
    .sidebar-header p { color: var(--text-muted); font-size: .76rem; margin-top: 3px; line-height: 1; }

    /* Day tabs */
    .day-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .day-tab {
      flex: 1;
      padding: 10px 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all .2s;
      white-space: nowrap;
      font-family: inherit;
      line-height: 1;
    }
    .day-tab:hover { color: var(--text); }
    .day-tab.active { color: var(--text); }
    .day-tab[data-day="all"].active { border-bottom-color: var(--text); }
    .day-tab[data-day="fri"].active { border-bottom-color: var(--fri); color: var(--fri); }
    .day-tab[data-day="sat"].active { border-bottom-color: var(--sat); color: var(--sat); }
    .day-tab[data-day="sun"].active { border-bottom-color: var(--sun); color: var(--sun); }
    .day-tab[data-day="mon"].active { border-bottom-color: var(--mon); color: var(--mon); }
    .day-tab[data-day="walks"].active { border-bottom-color: var(--walk); color: var(--walk); }
    .day-tab[data-day="transport"].active { border-bottom-color: var(--transport); color: var(--transport); }

    /* Tag filters */
    .tag-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .tag-btn {
      padding: 4px 10px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: transparent;
      font-size: .68rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 0;
      font-family: inherit;
      line-height: 1;
    }
    .tag-btn:hover { border-color: var(--text-muted); color: var(--text); }
    .tag-btn.active { color: #fff; }

    .place-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .place-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .62rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      letter-spacing: .02em;
      background: rgba(255,255,255,.06);
      color: var(--text-muted);
    }
    .place-tag .tag-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Place list */
    .place-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .place-list::-webkit-scrollbar { width: 5px; }
    .place-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .day-section { margin-bottom: 14px; }
    .day-section-title {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 7px 10px;
      margin-bottom: 5px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      line-height: 1;
    }
    .day-section-title.collapsible { cursor: pointer; }
    .day-section-title .chevron {
      font-size: .55rem;
      transition: transform .2s;
      opacity: .6;
    }
    .day-section-title .chevron.collapsed { transform: rotate(-90deg); }
    .day-section-body.collapsed { display: none; }

    .place-card {
      padding: 10px 12px;
      background: var(--bg-card);
      border-radius: var(--radius);
      margin-bottom: 5px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all .15s;
    }
    .place-card:hover { background: var(--bg-card-hover); }
    .place-card.active {
      background: var(--bg-card-hover);
      border-left-width: 4px;
    }

    .place-card-header { display: flex; align-items: center; gap: 8px; }
    .place-icon {
      width: 26px; height: 26px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem;
      flex-shrink: 0;
    }
    .place-card-header h3 {
      font-size: .82rem;
      font-weight: 600;
      flex: 1;
      line-height: 1.3;
    }
    .step-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .62rem;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
      line-height: 1;
    }
    .place-card p {
      margin-top: 5px;
      font-size: .74rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .place-card .place-tags { margin-top: 5px; }

    /* Timeline connector between steps */
    .timeline-connector {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0 3px 22px;
      font-size: .66rem;
      color: var(--text-muted);
      position: relative;
      line-height: 1.3;
    }
    .timeline-connector::before {
      content: '';
      position: absolute;
      left: 22px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .timeline-connector .conn-icon {
      font-size: .72rem;
      flex-shrink: 0;
      width: 16px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .timeline-connector a {
      color: var(--sat);
      text-decoration: none;
      font-size: .62rem;
      flex-shrink: 0;
    }
    .timeline-connector a:hover { text-decoration: underline; }

    /* Info sub-tabs */
    .info-subtabs {
      display: flex;
      gap: 0;
      margin-bottom: 10px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .info-subtab {
      flex: 1;
      padding: 8px 8px;
      text-align: center;
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      border: none;
      transition: all .15s;
      font-family: inherit;
      line-height: 1;
    }
    .info-subtab:not(:last-child) { border-right: 1px solid var(--border); }
    .info-subtab:hover { color: var(--text); background: rgba(255,255,255,.03); }
    .info-subtab.active { color: var(--text); background: var(--bg-card); }

    /* Info panel at bottom */
    .info-panel {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: .68rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .info-panel a { color: var(--sat); text-decoration: none; }
    .info-panel a:hover { text-decoration: underline; }

    /* Walk info cards */
    .walk-info {
      padding: 14px;
      background: var(--bg-card);
      border-radius: var(--radius);
      margin-bottom: 8px;
      border-left: 3px solid var(--walk);
    }
    .walk-info h3 { font-size: .84rem; font-weight: 700; margin-bottom: 5px; line-height: 1.3; }
    .walk-info .walk-meta { font-size: .7rem; color: var(--text-muted); margin-bottom: 5px; line-height: 1; }
    .walk-info p { font-size: .74rem; color: var(--text-muted); line-height: 1.5; }
    .walk-info .walk-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 12px;
      border-radius: 6px;
      background: rgba(230,57,70,.15);
      color: var(--walk);
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .walk-info .walk-btn:hover { background: rgba(230,57,70,.25); }

    /* ── Map ── */
    .map-wrapper { flex: 1; position: relative; }
    #map { height: 100%; width: 100%; }

    .toggle-sidebar {
      position: absolute;
      top: 12px; left: 12px;
      z-index: 1001;
      width: 38px; height: 38px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow);
    }
    .toggle-sidebar:hover { background: var(--bg-card-hover); }

    /* Legend */
    .map-legend {
      position: absolute;
      bottom: 24px; right: 12px;
      z-index: 1001;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      box-shadow: var(--shadow);
      font-size: .72rem;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .legend-row:last-child { margin-bottom: 0; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-line {
      width: 18px; height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: var(--bg-card) !important;
      color: var(--text) !important;
      border-radius: var(--radius) !important;
      border: 1px solid var(--border) !important;
      box-shadow: var(--shadow) !important;
    }
    .leaflet-popup-tip { background: var(--bg-card) !important; }
    .popup-title { font-weight: 700; font-size: .88rem; margin-bottom: 2px; line-height: 1.3; }
    .popup-day { font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; line-height: 1; margin-bottom: 3px; }
    .popup-desc { font-size: .76rem; color: var(--text-muted); margin-top: 5px; line-height: 1.45; }

    /* Drag zone + handle — hidden on desktop */
    .sheet-handle { display: none; }
    .sheet-drag-zone { display: contents; }

    @media (max-width: 720px) {
      :root {
        --sheet-peek: 110px;
        --sheet-half: 50vh;
        --sheet-full: 90vh;
      }

      body { flex-direction: column; }

      .map-wrapper { height: 100vh; width: 100%; }

      .sidebar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100% !important;
        min-width: 100% !important;
        height: var(--sheet-peek);
        max-height: 95vh;
        z-index: 1500;
        border-right: none;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -4px 30px rgba(0,0,0,.5);
        transition: height .3s cubic-bezier(.32,.72,0,1);
        transform: none !important;
        overflow: hidden;
        overscroll-behavior: contain;
      }
      .sidebar.collapsed {
        transform: none !important;
        height: var(--sheet-peek) !important;
      }
      .sidebar.dragging { transition: none; }

      .sheet-drag-zone {
        display: block;
        flex-shrink: 0;
        touch-action: none;
        cursor: grab;
        -webkit-tap-highlight-color: transparent;
      }
      .sheet-handle {
        display: flex;
        justify-content: center;
        padding: 6px 0 0;
        width: 100%;
      }
      .sheet-handle .handle-bar {
        width: 48px;
        height: 5px;
        border-radius: 3px;
        background: rgba(255,255,255,.3);
      }

      .sidebar-header { padding: 10px 16px 8px; touch-action: none; }
      .sidebar-header h1 { font-size: 1.05rem; }
      .sidebar-header p { font-size: .7rem; }

      .day-tabs { flex-shrink: 0; overflow-x: auto; touch-action: none; }
      .day-tab { padding: 12px 8px; font-size: .74rem; }

      .tag-filters { padding: 8px 12px; gap: 4px; flex-shrink: 0; }
      .tag-btn { padding: 5px 10px; font-size: .7rem; }

      .place-list { padding: 8px 10px; min-height: 0; touch-action: pan-y; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .place-card { padding: 10px 12px; }

      .info-panel {
        padding: 10px 14px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      }

      .toggle-sidebar { display: none !important; }

      .map-legend {
        bottom: calc(var(--sheet-peek) + 10px);
        right: 8px;
        font-size: .66rem;
        padding: 8px 12px;
      }

      /* Touch-friendly link targets on mobile */
      .place-tag {
        padding: 5px 10px;
        font-size: .68rem;
        min-height: 28px;
      }
      .timeline-connector a {
        padding: 6px 10px;
        margin: -6px -4px;
        font-size: .68rem;
        min-height: 32px;
        display: inline-flex;
        align-items: center;
      }
      .place-card a {
        min-height: 32px;
        display: inline-flex;
        align-items: center;
      }
      .info-panel a {
        display: inline-block;
        padding: 4px 0;
        min-height: 32px;
        line-height: 24px;
      }
      .ride-link {
        min-height: 38px !important;
        padding: 8px 4px !important;
      }
      .tips-link {
        display: block !important;
        padding: 10px 12px !important;
        margin: 4px 0 !important;
        background: rgba(255,255,255,.03);
        border-radius: 6px;
        min-height: 40px;
        line-height: 20px;
      }
    }
  </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sheet-drag-zone" id="sheetHandle">
    <div class="sheet-handle"><div class="handle-bar"></div></div>
    <div class="sidebar-header">
      <h1>🇲🇹 Malta Trip</h1>
      <p>4-day itinerary · Sliema base</p>
    </div>
    <div class="day-tabs" id="dayTabs"></div>
  </div>
  <div class="tag-filters" id="tagFilters"></div>
  <div class="place-list" id="placeList"></div>
  <div class="info-panel" id="infoPanel"></div>
</aside>

<div class="map-wrapper">
  <button class="toggle-sidebar" id="toggleSidebar">☰</button>
  <div id="map"></div>
  <div class="map-legend" id="legend"></div>
</div>

<script>
// ── Day colors ──
const DAY_COLORS = {
  fri: '#e85d04',
  sat: '#0096c7',
  sun: '#2d6a4f',
  mon: '#7b2cbf',
};
const DAY_LABELS = {
  fri: 'Friday',
  sat: 'Saturday',
  sun: 'Sunday',
  mon: 'Monday',
};
const WALK_COLOR = '#e63946';

const TAGS = {
  landmark:  { label: 'Landmark',     dot: '#d4956a' },
  culture:   { label: 'Culture',      dot: '#8a9ab5' },
  nature:    { label: 'Nature',       dot: '#6a9e80' },
  beach:     { label: 'Beach',        dot: '#6ab0bd' },
  food:      { label: 'Food & Drink', dot: '#c47a7a' },
  history:   { label: 'History',      dot: '#d4956a' },
  church:    { label: 'Church',       dot: '#8a9ab5' },
  viewpoint: { label: 'Viewpoint',    dot: '#6a9e80' },
  town:      { label: 'Town',         dot: '#8a929a' },
  transport: { label: 'Transport',    dot: '#8a929a' },
  stay:      { label: 'Stay',         dot: '#6ab0bd' },
};

// ── All places from your trip docs ──
const PLACES = [
  // FRIDAY — Valletta + Birgu + Sliema
  { id: 'f1',  day: 'fri', step: 1,  name: 'Malta Airport',               lat: 35.8575, lng: 14.4775, emoji: '✈️', tags: ['transport'], desc: 'Arrive. Take bus TD4 to Valletta (every 30 min, ~15 min ride).' },
  { id: 'f2',  day: 'fri', step: 2,  name: 'Valletta — City Gate',        lat: 35.8953, lng: 14.5088, emoji: '🏛️', tags: ['landmark'], desc: 'Main entrance to the baroque fortress city. Drop bags at luggage storage, grab breakfast.' },
  { id: 'f3',  day: 'fri', step: 3,  name: 'New Parliament Building',     lat: 35.8958, lng: 14.5094, emoji: '🏗️', tags: ['landmark'], desc: 'Designed by Renzo Piano, completed 2015.' },
  { id: 'f4',  day: 'fri', step: 4,  name: 'Hastings Gardens',            lat: 35.8975, lng: 14.5078, emoji: '🌿', tags: ['nature', 'viewpoint'], desc: 'Overlooks Floriana. Resting place of Governor Hastings (1754-1826).' },
  { id: 'f5',  day: 'fri', step: 5,  name: 'St Paul\'s Pro-Cathedral',    lat: 35.8985, lng: 14.5108, emoji: '⛪', tags: ['church'], desc: 'Anglican cathedral with iconic spire visible across the city.' },
  { id: 'f6',  day: 'fri', step: 6,  name: 'Teatru Manoel',               lat: 35.8988, lng: 14.5119, emoji: '🎭', tags: ['culture'], desc: 'One of the oldest working theatres in Europe (1731).' },
  { id: 'f7',  day: 'fri', step: 7,  name: 'St John\'s Co-Cathedral',     lat: 35.8978, lng: 14.5128, emoji: '⛪', tags: ['church', 'culture'], desc: 'Caravaggio masterpieces & one of the finest Baroque interiors in Europe.' },
  { id: 'f8',  day: 'fri', step: 8,  name: 'Grandmaster\'s Palace',       lat: 35.8968, lng: 14.5140, emoji: '🏰', tags: ['landmark', 'history'], desc: 'Pjazza San Ġorġ — towering over the square.' },
  { id: 'f9',  day: 'fri', step: 9,  name: 'Fort St Elmo / War Museum',   lat: 35.9011, lng: 14.5188, emoji: '🏰', tags: ['history', 'culture'], desc: 'Houses the National War Museum at the tip of the peninsula.' },
  { id: 'f10', day: 'fri', step: 10, name: 'Siege Bell Memorial',         lat: 35.9002, lng: 14.5195, emoji: '🔔', tags: ['history', 'viewpoint'], desc: 'WWII Santa Maria Bell, in memory of all who died.' },
  { id: 'f11', day: 'fri', step: 11, name: 'Lower Barrakka Gardens',      lat: 35.8968, lng: 14.5180, emoji: '🌿', tags: ['nature', 'viewpoint'], desc: 'Peaceful gardens with harbour views.' },
  { id: 'f12', day: 'fri', step: 12, name: 'Upper Barrakka Gardens',      lat: 35.8942, lng: 14.5116, emoji: '🌿', tags: ['nature', 'viewpoint'], desc: 'Spectacular Grand Harbour view. Saluting Battery fires at noon & 4pm.' },
  { id: 'f13', day: 'fri', step: 13, name: 'Auberge de Castille',         lat: 35.8942, lng: 14.5098, emoji: '🏛️', tags: ['landmark', 'history'], desc: 'Office of the Prime Minister.' },
  { id: 'f14', day: 'fri', step: 14, name: 'National Museum of Archaeology', lat: 35.8962, lng: 14.5104, emoji: '🏛️', tags: ['culture', 'history'], desc: 'Prehistoric artefacts from Malta\'s temple period.' },
  { id: 'f15', day: 'fri', step: 15, name: 'Strait Street',               lat: 35.8976, lng: 14.5145, emoji: '🍷', tags: ['food'], desc: 'Former red-light district, now buzzing with bars & restaurants.' },

  // SATURDAY — Blue Grotto, Ħaġar Qim, Dingli, Rabat
  { id: 's1',  day: 'sat', step: 1,  name: 'Blue Grotto',                 lat: 35.8194, lng: 14.4542, emoji: '🌊', tags: ['nature', 'viewpoint'], desc: 'Take bus 74 from Valletta. Sea cavern boat ride — go early morning for best light.' },
  { id: 's2',  day: 'sat', step: 2,  name: 'Wied iż-Żurrieq',            lat: 35.8224, lng: 14.4530, emoji: '⛵', tags: ['nature'], desc: 'Small creek with boat rides departing to Blue Grotto.' },
  { id: 's3',  day: 'sat', step: 3,  name: 'Ħaġar Qim Temples',          lat: 35.8270, lng: 14.4418, emoji: '🏛️', tags: ['history', 'culture'], desc: 'Megalithic temple complex, 3600–3200 BC. Allow ~1 hour.' },
  { id: 's4',  day: 'sat', step: 4,  name: 'Mnajdra Temples',             lat: 35.8262, lng: 14.4363, emoji: '🏛️', tags: ['history', 'culture'], desc: 'Further downhill from Ħaġar Qim. Excellent interpretation centre.' },

      font-size:14px;

      border:2px solid rgba(255,255,255,.2);
      position:relative;
    ">${place.emoji}<span style="
      position:absolute;top:-6px;right:-6px;
      width:16px;height:16px;border-radius:50%;
      background:#0f1923;color:${color};
      font-size:8px;font-weight:800;
      display:flex;align-items:center;justify-content:center;
      border:1px solid ${color};
    ">${place.step < 90 ? place.step : ''}</span></div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15],
    popupAnchor: [0, -18],
  });
}

function dayLabel(day) { return DAY_LABELS[day] || day; }
function gmapUrl(lat, lng, name) { return `https://www.google.com/maps/search/${encodeURIComponent(name + ', Malta')}/@${lat},${lng},17z`; }

function addMarkers(filteredPlaces) {
  Object.values(markerMap).forEach(m => map.removeLayer(m));
  markerMap = {};
  filteredPlaces.forEach(p => {
    const popupColor = DAY_COLORS[p.day] || '#6c757d';
    const m = L.marker([p.lat, p.lng], { icon: makeIcon(p) })
      .addTo(map)
      .bindPopup(`
        <div class="popup-day" style="color:${popupColor}">${dayLabel(p.day)} · Step ${p.step < 90 ? p.step : '—'}</div>
        <div class="popup-title">${p.name}</div>
        ${p.tags && p.tags.length ? `<div style="margin-top:4px">${p.tags.map(t => {
          const tag = TAGS[t];
          return tag ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:.62rem;padding:2px 7px;border-radius:8px;background:rgba(255,255,255,.06);color:#8b9db5;font-weight:500;margin-right:3px"><span style="width:5px;height:5px;border-radius:50%;background:${tag.dot}"></span>${tag.label}</span>` : '';
        }).join('')}</div>` : ''}
        <div class="popup-desc">${p.desc}</div>
        <div style="margin-top:6px"><a href="${gmapUrl(p.lat, p.lng, p.name)}" target="_blank" style="font-size:.76rem;color:#48cae4;text-decoration:none;display:inline-block;padding:4px 0;min-height:32px;line-height:24px">📍 Open in Google Maps ↗</a></div>
      `);
    m.on('click', () => selectPlace(p.id));
    markerMap[p.id] = m;
  });
}

function addWalkLines(day) {
  walkLayers.forEach(l => map.removeLayer(l));
  walkLayers = [];
  const relevant = day === 'all' || day === 'walks'
    ? WALKS
    : WALKS.filter(w => w.relevantDay === day);
  relevant.forEach(w => {
    const line = L.polyline(w.coords, {
      color: WALK_COLOR,
      weight: 3,
      opacity: 0.7,
      dashArray: '8,6',
    }).addTo(map);
    line.bindPopup(`<div class="popup-title">${w.name}</div><div class="popup-desc">${w.distance} — ${w.desc}</div>`);
    walkLayers.push(line);
  });
}

function addBusLines(day) {
  busLayers.forEach(l => map.removeLayer(l));
  busLayers = [];
  if (day === 'walks') return;
  const relevant = (day === 'all' || day === 'transport')
    ? BUS_ROUTES
    : BUS_ROUTES.filter(r => r.days.includes(day));
  relevant.forEach(r => {
    const isFerry = r.type === 'ferry';
    const line = L.polyline(r.coords, {
      color: isFerry ? FERRY_COLOR : BUS_COLOR,
      weight: isFerry ? 2.5 : 3,
      opacity: 0.7,
      dashArray: isFerry ? '6,8' : null,
    }).addTo(map);
    line.bindPopup(`
      <div class="popup-title">${isFerry ? '⛴️' : '🚌'} ${r.name}</div>
      <div class="popup-desc">${r.detail}</div>
      ${r.url ? `<div style="margin-top:6px"><a href="${r.url}" target="_blank" style="font-size:.76rem;color:#48cae4;text-decoration:none;display:inline-block;padding:4px 0;min-height:32px;line-height:24px">${isFerry ? '⛴️ Book / schedule' : '🚌 Timetable'} ↗</a></div>` : ''}
    `);
    busLayers.push(line);
  });
}

function filteredPlaces() {
  let list = PLACES;
  if (activeDay !== 'all' && activeDay !== 'walks' && activeDay !== 'transport') {
    list = list.filter(p => p.day === activeDay);
  }
  if (activeTag !== 'all') {
    list = list.filter(p => p.tags && p.tags.includes(activeTag));
  }
  return list;
}

function renderTagFilters() {
  const el = document.getElementById('tagFilters');
  if (activeDay === 'walks' || activeDay === 'transport') {
    el.style.display = 'none';
    return;
  }
  el.style.display = '';
  const usedTags = [...new Set(PLACES.flatMap(p => p.tags || []))];
  let html = `<button class="tag-btn ${activeTag === 'all' ? 'active' : ''}" data-tag="all" style="${activeTag === 'all' ? 'background:var(--text-muted);border-color:var(--text-muted);color:#fff' : ''}">All</button>`;
  usedTags.forEach(t => {
    const tag = TAGS[t];
    if (!tag) return;
    const isActive = activeTag === t;
    html += `<button class="tag-btn ${isActive ? 'active' : ''}" data-tag="${t}" style="${isActive ? `background:rgba(255,255,255,.12);border-color:${tag.dot};color:var(--text)` : `border-color:${tag.dot}40;color:var(--text-muted)`}"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${tag.dot};margin-right:4px"></span>${tag.label}</button>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTag = btn.dataset.tag;
      activePlace = null;
      renderTagFilters();
      renderList();
      const places = filteredPlaces();
      addMarkers(places);
    });
  });
}

// ── Tabs ──
function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  const items = [
    { key: 'all', label: 'All' },
    { key: 'fri', label: `<span style="width:7px;height:7px;border-radius:50%;background:${DAY_COLORS.fri};flex-shrink:0"></span>Fri` },
    { key: 'sat', label: `<span style="width:7px;height:7px;border-radius:50%;background:${DAY_COLORS.sat};flex-shrink:0"></span>Sat` },
    { key: 'sun', label: `<span style="width:7px;height:7px;border-radius:50%;background:${DAY_COLORS.sun};flex-shrink:0"></span>Sun` },
    { key: 'mon', label: `<span style="width:7px;height:7px;border-radius:50%;background:${DAY_COLORS.mon};flex-shrink:0"></span>Mon` },
    { key: 'walks', label: `<span style="width:12px;height:2px;border-radius:1px;background:${WALK_COLOR};flex-shrink:0"></span>Walks` },
    { key: 'transport', label: `<span style="width:12px;height:2px;border-radius:1px;background:${BUS_COLOR};flex-shrink:0"></span>Info` },
  ];
  tabs.innerHTML = items.map(t =>
    `<button class="day-tab ${activeDay === t.key ? 'active' : ''}" data-day="${t.key}">${t.label}</button>`
  ).join('');
  tabs.querySelectorAll('.day-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeDay = btn.dataset.day;
      activeTag = 'all';
      activePlace = null;
      renderTabs();
      renderTagFilters();
      renderList();
      refresh();
    });
  });
}

// ── Helpers ──
function connectorHtml(day, fromStep, toStep, color) {
  const key = `${day}-${fromStep}-${toStep}`;
  const c = CONNECTORS[key];
  if (!c) {
    return `<div class="timeline-connector"><span class="conn-icon" style="opacity:.4">↓</span><span style="opacity:.4">walk</span></div>`;
  }
  const icons = { walk: '↓', bus: '↓', ferry: '↓' };
  const modeLabels = { walk: '', bus: '🚌 ', ferry: '⛴️ ' };
  const lineColor = c.mode === 'ferry' ? FERRY_COLOR : c.mode === 'bus' ? BUS_COLOR : 'var(--text-muted)';
  return `<div class="timeline-connector">
    <span class="conn-icon" style="color:${lineColor}">${icons[c.mode]}</span>
    <span>${modeLabels[c.mode] || ''}${c.label}</span>
    ${c.url ? `<a href="${c.url}" target="_blank" onclick="event.stopPropagation()">↗</a>` : ''}
  </div>`;
}

function renderPlaceCard(p, color) {
  return `<div class="place-card ${activePlace === p.id ? 'active' : ''}" data-id="${p.id}" style="border-left-color:${color}">
    <div class="place-card-header">
      ${p.step < 90 ? `<div class="step-num" style="background:${color}">${p.step}</div>` : `<div class="place-icon" style="background:${color}20;color:${color}">${p.emoji}</div>`}
      <h3>${p.name}</h3>
    </div>
    ${p.desc ? `<p>${p.desc}</p>` : ''}
    <div class="place-tags">
      ${(p.tags || []).map(t => { const tag = TAGS[t]; return tag ? `<span class="place-tag"><span class="tag-dot" style="background:${tag.dot}"></span>${tag.label}</span>` : ''; }).join('')}
      <a href="${gmapUrl(p.lat, p.lng, p.name)}" target="_blank" class="place-tag" style="text-decoration:none;color:var(--text-muted)" onclick="event.stopPropagation()"><span class="tag-dot" style="background:#48cae4"></span>Maps ↗</a>
    </div>
  </div>`;
}

    <div class="day-section-title" style="background:rgba(45,106,79,.15);color:#2d6a4f;margin:12px 0 8px;cursor:default">💰 Tickets (adult)</div>
    <div class="place-card" style="border-left-color:#e63946;cursor:default">
      <div class="place-card-header"><h3>Pay as you go</h3><span style="font-size:.85rem;font-weight:700;color:#e63946">€${payAsYouGo.toFixed(2)}</span></div>

      <div class="place-card-header"><h3>12 Single Journeys Card</h3><span style="font-size:.85rem;font-weight:700;color:#f4a261">€19 + ferries</span></div>
      <p>12 bus trips (shareable). TD costs 2 each. No Valletta ferry / Gozo HS.</p>

    <div class="place-card" style="border-left-color:#48cae4;cursor:default">

    <div class="place-card" style="border-left-color:#2d6a4f;cursor:default">

      <p>All buses + Gozo HS return. Valletta ferry extra (~€${ferryTotal} top-up).</p>

// ── Sidebar list ──
function renderList() {
  const el = document.getElementById('placeList');
  const info = document.getElementById('infoPanel');

  if (activeDay === 'transport') {
    el.innerHTML = `
      <div class="info-subtabs">
        <button class="info-subtab ${activeInfoTab === 'routes' ? 'active' : ''}" data-tab="routes">Routes</button>
        <button class="info-subtab ${activeInfoTab === 'cost' ? 'active' : ''}" data-tab="cost">Cost</button>
        <button class="info-subtab ${activeInfoTab === 'tips' ? 'active' : ''}" data-tab="tips">Tips</button>
      </div>
      <div id="infoContent">
        ${activeInfoTab === 'routes' ? renderInfoRoutes() : activeInfoTab === 'cost' ? renderInfoCost() : renderInfoTips()}
      </div>`;
    info.innerHTML = 'Adult prices · Winter 2025/26';
    el.querySelectorAll('.info-subtab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeInfoTab = btn.dataset.tab;
        renderList();
      });
    });
    return;
  }

  if (activeDay === 'walks') {
    el.innerHTML = WALKS.map(w => `
      <div class="walk-info">
        <h3>🥾 ${w.name}</h3>
        <div class="walk-meta">${w.distance} · Best on ${dayLabel(w.relevantDay)}</div>
        <p>${w.desc}</p>
        <button class="walk-btn" onclick="zoomToWalk('${w.id}')">Show on map</button>
      </div>
    `).join('');
    info.innerHTML = 'Walk data from Malta Tourism Authority & Ministry for Gozo brochures.';
    return;
  }

  const places = filteredPlaces();
  const days = activeDay === 'all' ? ['fri', 'sat', 'sun', 'mon'] : [activeDay];
  const isAllView = activeDay === 'all';

  let html = '';
  days.forEach(day => {
    const dayPlaces = places.filter(p => p.day === day).sort((a, b) => a.step - b.step);
    if (dayPlaces.length === 0) return;
    const color = DAY_COLORS[day];
    const isCollapsed = isAllView && collapsedDays[day];

    html += `<div class="day-section">
      <div class="day-section-title ${isAllView ? 'collapsible' : ''}" style="background:${color}15;color:${color}" data-collapse="${day}">
        <span>${dayLabel(day)} · ${dayPlaces.filter(p => p.step < 90).length} stops</span>
        ${isAllView ? `<span class="chevron ${isCollapsed ? 'collapsed' : ''}">▼</span>` : ''}
      </div>
      <div class="day-section-body ${isCollapsed ? 'collapsed' : ''}">
        ${dayPlaces.map((p, i) => {
          let out = '';
          if (i > 0 && p.step < 90 && dayPlaces[i-1].step < 90) {
            out += connectorHtml(day, dayPlaces[i-1].step, p.step, color);
          }
          out += renderPlaceCard(p, color);
          return out;
        }).join('')}
      </div>
    </div>`;
  });

  el.innerHTML = html || '<div style="text-align:center;padding:40px;color:var(--text-muted)">No places for this filter.</div>';
  info.innerHTML = `${places.filter(p => p.step < 90).length} stops · Click to fly there`;

  el.querySelectorAll('.place-card[data-id]').forEach(card => {
    card.addEventListener('click', () => selectPlace(card.dataset.id));
  });

  if (isAllView) {
    el.querySelectorAll('.day-section-title[data-collapse]').forEach(title => {
      title.addEventListener('click', () => {
        const day = title.dataset.collapse;
        collapsedDays[day] = !collapsedDays[day];
        renderList();
      });
    });
  }
}

function selectPlace(id) {
  activePlace = id;
  renderList();
  const p = PLACES.find(x => x.id === id);
  if (p && markerMap[id]) {
    const padBottom = isMobile() ? SNAP_PEEK + 20 : 0;
    map.flyTo([p.lat, p.lng], 16, { duration: 0.8, paddingBottomRight: [0, padBottom] });
    markerMap[id].openPopup();
    mobileSnapToPeek();
  }
}

window.zoomToWalk = function(wid) {
  const w = WALKS.find(x => x.id === wid);
  if (!w) return;
  const bounds = L.latLngBounds(w.coords);
  map.flyToBounds(bounds, { padding: [50, 50], duration: 0.8 });
};

window.zoomToBus = function(bid) {
  const r = BUS_ROUTES.find(x => x.id === bid);
  if (!r) return;
  const bounds = L.latLngBounds(r.coords);
  map.flyToBounds(bounds, { padding: [60, 60], duration: 0.8 });
};

    <div class="legend-row">
      <div class="legend-line" style="background:${FERRY_COLOR};height:2px"></div>
      <span>Ferry</span>
    </div>
  `;
}

// ── Refresh map ──
function refresh() {
  const places = filteredPlaces();
  addMarkers(places);
  addWalkLines(activeDay);
  addBusLines(activeDay);
  if (activeDay !== 'all' && activeDay !== 'walks' && activeDay !== 'transport') {
    const dayPlaces = places.filter(p => p.day === activeDay);
    if (dayPlaces.length) {
      const bounds = L.latLngBounds(dayPlaces.map(p => [p.lat, p.lng]));
      const pb = isMobile() ? SNAP_PEEK + 20 : 60;
      map.flyToBounds(bounds, { paddingTopLeft: [60, 60], paddingBottomRight: [60, pb], duration: 0.8 });
    }
  } else if (activeDay === 'walks') {
    map.flyTo([35.94, 14.38], 11, { duration: 0.8 });
  } else {
    map.flyTo([35.94, 14.42], 11, { duration: 0.8 });
  }
}

// ── Toggle sidebar (desktop) ──
document.getElementById('toggleSidebar').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

// ── Mobile bottom sheet ──
const isMobile = () => window.innerWidth <= 720;
const SNAP_PEEK = 110;
const SNAP_HALF_RATIO = 0.50;
const SNAP_FULL_RATIO = 0.90;

let sheetState = 'peek';
let dragStartY = 0;
let dragStartH = 0;
let isDragging = false;

function getSnapValues() {
  const vh = window.innerHeight;
  return { peek: SNAP_PEEK, half: Math.round(vh * SNAP_HALF_RATIO), full: Math.round(vh * SNAP_FULL_RATIO) };
}

function setSheetHeight(h) {
  const sidebar = document.getElementById('sidebar');
  sidebar.style.height = h + 'px';
}

function snapSheet(state) {
  sheetState = state;
  const sidebar = document.getElementById('sidebar');
  const snaps = getSnapValues();
  sidebar.classList.remove('dragging');
  setSheetHeight(snaps[state]);
}

function snapToNearest(h) {
  const snaps = getSnapValues();
  const distances = [
    { state: 'peek', d: Math.abs(h - snaps.peek) },
    { state: 'half', d: Math.abs(h - snaps.half) },
    { state: 'full', d: Math.abs(h - snaps.full) },
  ];
  distances.sort((a, b) => a.d - b.d);
  snapSheet(distances[0].state);
}

const dragZone = document.getElementById('sheetHandle');
const sidebarEl = document.getElementById('sidebar');

function initDrag(e) {
  if (!isMobile()) return;
  if (e.target.closest('.day-tab')) return;
  isDragging = true;
  dragStartY = e.touches[0].clientY;
  dragStartH = sidebarEl.offsetHeight;
  sidebarEl.classList.add('dragging');
  e.preventDefault();
}

function moveDrag(e) {
  if (!isDragging) return;
  e.preventDefault();
  const dy = dragStartY - e.touches[0].clientY;
  const newH = Math.max(SNAP_PEEK, Math.min(window.innerHeight * 0.95, dragStartH + dy));
  setSheetHeight(newH);
}

function endDrag() {
  if (!isDragging) return;
  isDragging = false;
  sidebarEl.classList.remove('dragging');
  snapToNearest(sidebarEl.offsetHeight);
}

dragZone.addEventListener('touchstart', initDrag, { passive: false, capture: true });
dragZone.addEventListener('touchmove', moveDrag, { passive: false, capture: true });
dragZone.addEventListener('touchend', endDrag, { capture: true });

dragZone.addEventListener('click', e => {
  if (!isMobile()) return;
  if (e.target.closest('.day-tab')) return;
  const cycle = { peek: 'half', half: 'full', full: 'peek' };
  snapSheet(cycle[sheetState] || 'half');
});

function mobileSnapToPeek() {
  if (isMobile()) snapSheet('peek');
}

// ── Init ──
renderTabs();
renderTagFilters();
renderList();
renderLegend();
addMarkers(PLACES);
addWalkLines('all');
addBusLines('all');

if (isMobile()) {
  snapSheet('peek');
  map.invalidateSize();
}
window.addEventListener('resize', () => {
  if (isMobile()) snapSheet(sheetState);
  map.invalidateSize();
});
</script>
